services:
  web:
    build: .
    container_name: muxi_photo_web
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      FLASK_ENV: production
      SECRET_KEY: change-me-in-production
      MONGO_URI: mongodb://mongodb:27017/muxi_photo?serverSelectionTimeoutMS=5000
      DATABASE_NAME: muxi_photo
      UPLOAD_FOLDER: uploads
      MAX_UPLOAD_SIZE_MB: 10
      SITE_NAME: 泸州高中木樨映像
      ADMIN_INIT_SHOW_ON_PAGE: "false"
      SESSION_COOKIE_SECURE: "false"
      PROXY_FIX: "false"
      GUNICORN_WORKERS: 2
    volumes:
      - ./uploads:/app/uploads
    depends_on:
      mongodb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:5000/readyz', timeout=3).read()"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  mongodb:
    image: mongo:7
    container_name: muxi_photo_mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: muxi_photo
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

volumes:
  mongo_data:
