{% set pages = ((total + per_page - 1) // per_page) if per_page else 1 %}
{% if pages > 1 %}
<nav class="pagination">
  {% if page > 1 %}<a href="{{ request.path }}?page={{ page - 1 }}&q={{ request.args.get('q','') }}&status={{ request.args.get('status','') }}&tag={{ request.args.get('tag','') }}">上一页</a>{% endif %}
  <span>第 {{ page }} / {{ pages }} 页</span>
  {% if page < pages %}<a href="{{ request.path }}?page={{ page + 1 }}&q={{ request.args.get('q','') }}&status={{ request.args.get('status','') }}&tag={{ request.args.get('tag','') }}">下一页</a>{% endif %}
</nav>
{% endif %}
